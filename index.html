<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUG Planogram — คู่มือการจัดเรียง ไถ่เชียงวัสดุ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sidebar:380px;
  --bg:#12141a;
  --panel:#1b1e26;
  --panel2:#222630;
  --border:#2e3340;
  --accent:#e8651a;
  --green:#2ecc71;
  --text:#e8eaf0;
  --text2:#8891a4;
  --danger:#e84855;
  --sug-orange:#e8651a;
  --light-orange:#f4a460;
  --dark-orange:#d2691e;
  --pink:#e87090;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;height:100vh}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-header .logo{width:48px;height:28px;background:var(--sug-orange);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;letter-spacing:1px}
.sidebar-header h1{font-size:14px;font-weight:600}
.sidebar-header h1 span{font-size:11px;color:var(--text2);display:block;font-weight:400}

.tab-bar{display:flex;border-bottom:1px solid var(--border)}
.tab-bar button{flex:1;padding:10px;font-size:12px;background:none;border:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:.15s}
.tab-bar button:hover{color:var(--text)}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-content.active{display:flex}

/* Shelf selector */
.shelf-selector{padding:10px;display:flex;gap:6px;border-bottom:1px solid var(--border)}
.shelf-btn{flex:1;padding:8px 4px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:11px;font-family:inherit;transition:.15s;text-align:center}
.shelf-btn:hover{border-color:var(--accent);color:var(--text)}
.shelf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Product list */
.section-header{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
#product-list{flex:1;overflow-y:auto;padding:4px 10px}
.product-row{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:4px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px;font-size:11px}
.product-row:hover{border-color:var(--accent);transform:translateY(-1px)}
.product-row.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,101,26,.25)}
.product-row .zone-bar{width:4px;height:32px;border-radius:2px;flex-shrink:0}
.product-row .p-info{flex:1;min-width:0}
.product-row .p-code{font-size:9px;color:var(--text2);font-family:monospace}
.product-row .p-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-row .p-meta{font-size:10px;color:var(--text2)}
.product-row .p-price{font-size:12px;font-weight:700;color:var(--green);white-space:nowrap}
.product-row .p-qty{display:flex;align-items:center;gap:4px}
.product-row .qty-btn{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.product-row .qty-btn:hover{border-color:var(--accent)}
.product-row .qty-val{font-size:12px;font-weight:700;min-width:18px;text-align:center}

/* Order tab */
#order-content{flex:1;overflow-y:auto;padding:14px}
.order-summary-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.order-summary-header h3{font-size:14px}
.order-summary-header .total{font-size:20px;font-weight:800;color:var(--green)}
.order-table{width:100%;font-size:11px;border-collapse:collapse}
.order-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:600;font-size:10px;text-transform:uppercase}
.order-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.order-table td:last-child{text-align:right;color:var(--green);font-weight:600}
.order-table .qty-cell{text-align:center;color:var(--accent)}
.order-actions{padding:12px 0;display:flex;gap:8px}
.order-actions button{flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:.15s}
.order-actions button:hover{border-color:var(--accent)}
.order-actions button.primary{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Canvas ── */
#canvas-wrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}

/* ── Toolbar ── */
#toolbar{position:absolute;top:14px;left:14px;display:flex;gap:6px;z-index:5;flex-wrap:wrap;max-width:calc(100% - 28px)}
.tool-btn{padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:11px;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tool-btn:hover{border-color:var(--accent);background:var(--panel2)}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Info tooltip ── */
#info-tooltip{position:absolute;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:12px;pointer-events:none;display:none;z-index:20;min-width:220px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#info-tooltip .it-name{font-size:14px;font-weight:700;margin-bottom:6px}
#info-tooltip .it-row{color:var(--text2);line-height:1.9}
#info-tooltip .it-row b{color:var(--text)}

/* ── Status bar ── */
#status-bar{position:absolute;bottom:14px;left:14px;right:14px;font-size:11px;color:var(--text2);background:var(--panel);padding:8px 16px;border-radius:8px;border:1px solid var(--border);z-index:5;display:flex;justify-content:space-between;align-items:center}
#status-bar .status-right{display:flex;gap:16px}
#status-bar .stat b{color:var(--text)}

/* ── Legend ── */
#legend{position:absolute;bottom:60px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;z-index:5;font-size:11px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.legend-item:last-child{margin-bottom:0}
.legend-swatch{width:14px;height:14px;border-radius:3px}

/* ═══ TUTORIAL ═══ */
#tutorial-overlay{position:fixed;inset:0;background:rgba(10,12,18,.92);z-index:100;display:flex;align-items:center;justify-content:center}
#tutorial-overlay.hidden{display:none}
.tutorial-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:36px 44px;max-width:680px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
.tutorial-card h2{font-size:22px;margin-bottom:8px}
.tutorial-card .tut-subtitle{color:var(--text2);font-size:14px;margin-bottom:28px;line-height:1.6}
.tut-steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;text-align:left;margin-bottom:28px}
.tut-steps-grid .tut-step{background:var(--bg);padding:16px;border-radius:10px;border:1px solid var(--border)}
.tut-step .tut-step-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:14px;margin-bottom:8px}
.tut-step h4{font-size:14px;margin-bottom:4px}
.tut-step p{font-size:12px;color:var(--text2);line-height:1.7}
.tut-nav{display:flex;gap:10px;justify-content:center}
.tut-nav button{padding:12px 32px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:14px;font-family:inherit;transition:.15s}
.tut-nav .btn-skip{background:transparent;color:var(--text2)}
.tut-nav .btn-start{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.tut-nav .btn-start:hover{background:#d45a15}
.tut-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.tut-dots .dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.tut-dots .dot.active{background:var(--accent)}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#454b5a}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">SUG</div>
      <h1>Planogram <span>คู่มือการจัดเรียง ไถ่เชียงวัสดุ</span></h1>
    </div>
    <div class="tab-bar">
      <button class="active" onclick="switchTab('products')">ชั้นวาง Shelves</button>
      <button onclick="switchTab('order')">สรุปคำสั่งซื้อ Order</button>
    </div>

    <div id="tab-products" class="tab-content active">
      <div class="shelf-selector" id="shelf-selector"></div>
      <div id="product-list"></div>
    </div>

    <div id="tab-order" class="tab-content">
      <div id="order-content">
        <div class="order-summary-header">
          <h3>สรุปคำสั่งซื้อ</h3>
          <div class="total" id="order-total">฿0</div>
        </div>
        <table class="order-table">
          <thead><tr><th>สินค้า</th><th>รหัส</th><th>จำนวน</th><th>ราคา</th></tr></thead>
          <tbody id="order-tbody"></tbody>
        </table>
        <div class="order-actions">
          <button onclick="exportCSV()">ส่งออก CSV</button>
          <button onclick="exportPDF()" class="primary">พิมพ์ Print</button>
        </div>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="toolbar">
      <button class="tool-btn" onclick="resetCamera()">⟲ Reset View</button>
      <button class="tool-btn" onclick="showTutorial()">? Help</button>
    </div>
    <canvas id="c"></canvas>
    <div id="info-tooltip"></div>
    <div id="status-bar">
      <span id="status-text">คลิกที่ชั้นวางเพื่อดูรายละเอียด — Click a shelf to view details</span>
      <div class="status-right">
        <span class="stat">Shelves: <b>4</b></span>
        <span class="stat">Products: <b id="stat-products">0</b></span>
        <span class="stat">Total: <b id="stat-total" style="color:var(--green)">฿0</b></span>
      </div>
    </div>
    <div id="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#f4a460"></div>แพ็คถุง SUG (Bag Pack)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#d2691e"></div>SUG Premium Box</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#e87090"></div>อุปกรณ์เสริม (Accessories)</div>
    </div>
  </div>
</div>

<!-- Tutorial -->
<div id="tutorial-overlay">
  <div class="tutorial-card" id="tut-card"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ═══════════════════════════════════════════
//  TUTORIAL (5-step)
// ═══════════════════════════════════════════
const tutorialPages = [
  {
    title:'ยินดีต้อนรับ — Welcome',
    subtitle:'ระบบแผนผังการจัดเรียงสินค้า SUG',
    content:`
      <div style="margin-bottom:20px">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:38px;background:var(--sug-orange);border-radius:6px;font-weight:900;font-size:18px;color:#fff;letter-spacing:1px">SUG</div>
      </div>
      <p style="color:var(--text2);font-size:13px;line-height:1.8;margin-bottom:8px">
        แอปนี้แสดงแผนผังการจัดเรียงสินค้า SUG สำเร็จรูป 4 ชั้นวาง<br>
        ตามคู่มือการจัดเรียง ไถ่เชียงวัสดุ<br><br>
        This app displays 4 pre-built SUG shelf planograms<br>
        with products already arranged per the official guide.
      </p>
    `
  },
  {
    title:'ชั้นวาง 3 โซนสี — Color Zones',
    subtitle:'แต่ละชั้นวางแบ่งเป็น 3 โซนตามสีบรรจุภัณฑ์',
    content:`
      <div class="tut-steps-grid">
        <div class="tut-step">
          <div style="width:24px;height:24px;border-radius:4px;background:#f4a460;margin-bottom:8px"></div>
          <h4>ส้มอ่อน — แพ็คถุง SUG</h4>
          <p>สินค้าแบบแพ็คถุง (Bag Pack) จัดเรียงที่ชั้นบน-กลาง สำหรับแขวนผนัง</p>
        </div>
        <div class="tut-step">
          <div style="width:24px;height:24px;border-radius:4px;background:#d2691e;margin-bottom:8px"></div>
          <h4>ส้มเข้ม — Premium Box</h4>
          <p>สินค้ากล่อง Premium Box จัดเรียงที่ชั้นกลาง สำหรับตั้งวาง</p>
        </div>
        <div class="tut-step">
          <div style="width:24px;height:24px;border-radius:4px;background:#e87090;margin-bottom:8px"></div>
          <h4>ชมพู — อุปกรณ์เสริม</h4>
          <p>อุปกรณ์เสริม เชิงชาย แผ่นปิดรอยต่อ จัดเรียงที่ชั้นล่างสุด</p>
        </div>
        <div class="tut-step">
          <div style="width:24px;height:24px;border-radius:4px;background:#e8651a;margin-bottom:8px"></div>
          <h4>4 ชั้นวาง</h4>
          <p>เลือกดูชั้นวางที่ 1-4 จากแถบด้านซ้าย กล้องจะหมุนไปยังชั้นที่เลือก</p>
        </div>
      </div>
    `
  },
  {
    title:'การนำทาง 3D — Navigation',
    subtitle:'หมุน ซูม เลื่อนมุมมอง 3 มิติ',
    content:`
      <div style="text-align:left;max-width:360px;margin:0 auto">
        <table style="width:100%;font-size:13px;line-height:2.4">
          <tr><td style="color:var(--text2)">คลิกขวา + ลาก</td><td><b>หมุนมุมมอง</b></td></tr>
          <tr><td style="color:var(--text2)">Scroll</td><td><b>ซูมเข้า/ออก</b></td></tr>
          <tr><td style="color:var(--text2)">คลิกกลาง + ลาก</td><td><b>เลื่อนมุมมอง</b></td></tr>
          <tr><td style="color:var(--text2)">คลิกซ้าย</td><td><b>เลือกสินค้า</b></td></tr>
        </table>
      </div>
    `
  },
  {
    title:'ปรับจำนวน — Adjust Quantities',
    subtitle:'เพิ่ม/ลดจำนวนสินค้าได้',
    content:`
      <div class="tut-steps-grid">
        <div class="tut-step">
          <div class="tut-step-num">1</div>
          <h4>ดับเบิลคลิก</h4>
          <p>ดับเบิลคลิกสินค้าบนชั้นวาง หรือในรายการด้านซ้าย เพื่อเพิ่มจำนวน +1</p>
        </div>
        <div class="tut-step">
          <div class="tut-step-num">2</div>
          <h4>ปุ่ม +/−</h4>
          <p>ใช้ปุ่ม +/− ในรายการสินค้าด้านซ้าย เพื่อปรับจำนวนตามต้องการ</p>
        </div>
      </div>
    `
  },
  {
    title:'ส่งออกคำสั่งซื้อ — Export',
    subtitle:'สรุปรายการและส่งออก CSV',
    content:`
      <div class="tut-steps-grid">
        <div class="tut-step">
          <div class="tut-step-num">1</div>
          <h4>แท็บ สรุปคำสั่งซื้อ</h4>
          <p>คลิกแท็บ "สรุปคำสั่งซื้อ" เพื่อดูรายการสินค้าทั้งหมดพร้อมราคารวม</p>
        </div>
        <div class="tut-step">
          <div class="tut-step-num">2</div>
          <h4>ส่งออก CSV</h4>
          <p>กดปุ่ม "ส่งออก CSV" เพื่อดาวน์โหลดไฟล์รายการสินค้าสำหรับสั่งซื้อ</p>
        </div>
      </div>
    `
  }
];

let tutPage = 0;
function renderTutorial() {
  const card = document.getElementById('tut-card');
  const page = tutorialPages[tutPage];
  const isLast = tutPage === tutorialPages.length - 1;
  const isFirst = tutPage === 0;
  card.innerHTML = `
    <h2>${page.title}</h2>
    <p class="tut-subtitle">${page.subtitle}</p>
    ${page.content}
    <div class="tut-dots">${tutorialPages.map((_,i) => `<div class="dot ${i===tutPage?'active':''}"></div>`).join('')}</div>
    <div class="tut-nav">
      ${isFirst ? '<button class="btn-skip" onclick="closeTutorial()">ข้าม Skip</button>' : '<button class="btn-skip" onclick="prevTutPage()">← ย้อนกลับ</button>'}
      <button class="btn-start" onclick="${isLast ? 'closeTutorial()' : 'nextTutPage()'}">
        ${isLast ? 'เริ่มใช้งาน Start →' : 'ถัดไป Next →'}
      </button>
    </div>
  `;
}
function nextTutPage() { if (tutPage < tutorialPages.length-1) { tutPage++; renderTutorial(); } }
function prevTutPage() { if (tutPage > 0) { tutPage--; renderTutorial(); } }
function closeTutorial() { document.getElementById('tutorial-overlay').classList.add('hidden'); }
function showTutorial() { tutPage=0; document.getElementById('tutorial-overlay').classList.remove('hidden'); renderTutorial(); }

if (!localStorage.getItem('sug-planogram-v2-visited')) {
  localStorage.setItem('sug-planogram-v2-visited','1');
  renderTutorial();
} else {
  closeTutorial();
}
renderTutorial();

// ═══════════════════════════════════════════
//  PRODUCT DATA — 4 SHELF SETS
// ═══════════════════════════════════════════
// zone: 'bag' = ส้มอ่อน (แพ็คถุง), 'box' = ส้มเข้ม (Premium Box), 'acc' = ชมพู (อุปกรณ์เสริม)
const ZONE_COLORS = {
  bag: '#f4a460',
  box: '#d2691e',
  acc: '#e87090'
};

const SHELF_SETS = [
  {
    name: 'ชั้นที่ 1 — สกรูปลายสว่าน',
    nameEn: 'Shelf 1 — Self-drilling Screws',
    products: [
      // แพ็คถุง (bag) — ส้มอ่อน
      {code:'BG-0001',name:'สกรูยึดลอนคู่ #8×1"',zone:'bag',pack:'แพ็คถุง 20 ตัว',price:25,qty:1},
      {code:'BG-0002',name:'สกรูยึดลอนคู่ #8×1.5"',zone:'bag',pack:'แพ็คถุง 20 ตัว',price:30,qty:1},
      {code:'BG-0003',name:'สกรูยึดลอนคู่ #8×2"',zone:'bag',pack:'แพ็คถุง 20 ตัว',price:35,qty:1},
      {code:'BG-0004',name:'สกรูยึดลอนคู่ #10×2"',zone:'bag',pack:'แพ็คถุง 15 ตัว',price:35,qty:1},
      {code:'BG-0005',name:'สกรูยึดลอนคู่ #10×2.5"',zone:'bag',pack:'แพ็คถุง 15 ตัว',price:40,qty:1},

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setClearColor(0x12141a);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x12141a, 12, 35);

const camera = new THREE.PerspectiveCamera(45, 1, 0.05, 50);
camera.position.set(3.5, 3, 6);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(3, 1.1, 0);
controls.mouseButtons = {LEFT:null, MIDDLE:THREE.MOUSE.PAN, RIGHT:THREE.MOUSE.ROTATE};

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
dirLight.position.set(5, 8, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048,2048);
dirLight.shadow.camera.near=0.5; dirLight.shadow.camera.far=30;
dirLight.shadow.camera.left=-10; dirLight.shadow.camera.right=10;
dirLight.shadow.camera.top=8; dirLight.shadow.camera.bottom=-1;
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0x8899cc,0.3)).position.set(-3,2,-2);

// Floor
scene.add(new THREE.GridHelper(20,40,0x2a2e38,0x1e2230));
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x15171e, roughness:0.9})
);
floorMesh.rotation.x = -Math.PI/2;
floorMesh.position.y = -0.001;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// ═══════════════════════════════════════════
const SHELF_H = 2.3;
const SHELF_W = 1.2;
const SHELF_D = 0.45;
const LEVELS = 9;
const POST_T = 0.035;

const shelfGroups = [];
const productMeshes = []; // flat array of all product meshes for raycasting

function createShelfUnit3D(shelfIdx) {
  const shelfSet = SHELF_SETS[shelfIdx];
  const x = shelfIdx * (SHELF_W + 0.08);
  const group = new THREE.Group();
  group.position.set(x, 0, 0);

  const postMat = new THREE.MeshStandardMaterial({color:0x555555, roughness:0.5, metalness:0.6});
  const shelfMat = new THREE.MeshStandardMaterial({color:0x4a4540, roughness:0.55, metalness:0.35});

  // 4 posts
  const postGeo = new THREE.BoxGeometry(POST_T, SHELF_H, POST_T);
  [[-SHELF_W/2+0.02,-SHELF_D/2+0.02],[SHELF_W/2-0.02,-SHELF_D/2+0.02],
   [-SHELF_W/2+0.02,SHELF_D/2-0.02],[SHELF_W/2-0.02,SHELF_D/2-0.02]].forEach(([px,pz])=>{
    const p = new THREE.Mesh(postGeo, postMat);
    p.position.set(px, SHELF_H/2, pz);
    p.castShadow = true;
    group.add(p);
  });

  // Shelf surfaces
  const shelfGeo = new THREE.BoxGeometry(SHELF_W-0.01, 0.018, SHELF_D-0.01);
  for(let i=0; i<=LEVELS; i++){
    const y = (i/LEVELS)*(SHELF_H-0.04)+0.02;
    const s = new THREE.Mesh(shelfGeo, shelfMat.clone());
    s.position.set(0,y,0);
    s.castShadow=true; s.receiveShadow=true;
    group.add(s);
  }

  // Back panel
  const backGeo = new THREE.BoxGeometry(SHELF_W-0.01, SHELF_H-0.02, 0.004);
  const backMat = new THREE.MeshStandardMaterial({color:0x2a2e38, roughness:0.8, transparent:true, opacity:0.45});
  const back = new THREE.Mesh(backGeo, backMat);
  back.position.set(0, SHELF_H/2, -SHELF_D/2+0.004);
  group.add(back);

  // Side panels
  [-1,1].forEach(side=>{
    const sg = new THREE.BoxGeometry(0.004, SHELF_H-0.02, SHELF_D-0.01);
    const sm = new THREE.MeshStandardMaterial({color:0x555555, roughness:0.6, metalness:0.4, transparent:true, opacity:0.3});
    const sp = new THREE.Mesh(sg,sm);
    sp.position.set(side*(SHELF_W/2-0.002), SHELF_H/2, 0);
    group.add(sp);
  });

  // Brand header
  const headerGeo = new THREE.BoxGeometry(SHELF_W, 0.12, SHELF_D*0.35);
  const headerMat = new THREE.MeshStandardMaterial({color:0xe8651a, roughness:0.4, metalness:0.3});
  const header = new THREE.Mesh(headerGeo, headerMat);
  header.position.set(0, SHELF_H+0.06, 0);
  header.castShadow = true;
  group.add(header);

  // Header label
  const lc = document.createElement('canvas');
  lc.width=256; lc.height=64;
  const lctx = lc.getContext('2d');
  lctx.fillStyle='#e8651a';
  lctx.fillRect(0,0,256,64);
  lctx.fillStyle='#fff';
  lctx.font='bold 26px sans-serif';
  lctx.textAlign='center';
  lctx.fillText('SUG', 128, 24);
  lctx.font='14px sans-serif';
  lctx.fillText(`Shelf ${shelfIdx+1}`, 128, 50);
  const ltex = new THREE.CanvasTexture(lc);
  const labelGeo = new THREE.PlaneGeometry(SHELF_W*0.7, 0.10);
  const labelMat = new THREE.MeshBasicMaterial({map:ltex, transparent:true});
  const labelMesh = new THREE.Mesh(labelGeo, labelMat);
  labelMesh.position.set(0, SHELF_H+0.065, SHELF_D*0.175+0.001);
  group.add(labelMesh);

  // Zone color strips on side (visual indicator)
  const bagProducts = shelfSet.products.filter(p=>p.zone==='bag');
  const boxProducts = shelfSet.products.filter(p=>p.zone==='box');
  const accProducts = shelfSet.products.filter(p=>p.zone==='acc');
  const totalProducts = shelfSet.products.length;

  // Calculate level allocation
  const usableLevels = LEVELS; // levels 0..LEVELS-1 (top of each gap)
  const bagLevels = Math.max(2, Math.round(usableLevels * bagProducts.length / totalProducts));
  const accLevels = Math.max(1, Math.min(2, accProducts.length));
  const boxLevels = usableLevels - bagLevels - accLevels;

  // Place products on shelves
  placeProductsOnShelf(group, shelfIdx, bagProducts, 'bag', bagLevels + boxLevels + accLevels - 1, bagLevels, x);
  placeProductsOnShelf(group, shelfIdx, boxProducts, 'box', boxLevels + accLevels - 1, boxLevels, x);
  placeProductsOnShelf(group, shelfIdx, accProducts, 'acc', accLevels - 1, accLevels, x);

  scene.add(group);
  shelfGroups.push(group);
}

function placeProductsOnShelf(group, shelfIdx, products, zone, startLevel, numLevels, shelfX) {
  if(!products.length || numLevels <= 0) return;

  const zoneColor = new THREE.Color(ZONE_COLORS[zone]);
  const productsPerLevel = Math.ceil(products.length / numLevels);
  const boxW = 0.10;
  const boxD = 0.08;
  const boxH = 0.065;
  const gap = 0.005;
  const maxPerRow = Math.floor((SHELF_W - 0.08) / (boxW + gap));

  let pIdx = 0;
  for(let lvl = 0; lvl < numLevels && pIdx < products.length; lvl++){
    const levelIdx = startLevel - lvl;
    const levelY = (levelIdx / LEVELS) * (SHELF_H - 0.04) + 0.02 + 0.009;
    const rowCount = Math.min(maxPerRow, products.length - pIdx);
    const rowWidth = rowCount * (boxW + gap) - gap;
    const startX = -rowWidth / 2 + boxW / 2;

    for(let col = 0; col < rowCount && pIdx < products.length; col++){
      const product = products[pIdx];
      const geo = new THREE.BoxGeometry(boxW, boxH, boxD);

      // Slightly vary the color per product for visual interest
      const colorVariant = zoneColor.clone();
      colorVariant.offsetHSL(0, 0, (pIdx % 3 - 1) * 0.04);
      const mat = new THREE.MeshStandardMaterial({color:colorVariant, roughness:0.55, metalness:0.15});
      const mesh = new THREE.Mesh(geo, mat);

      mesh.position.set(startX + col * (boxW + gap), levelY + boxH/2, 0);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = {shelfIdx, productIdx: SHELF_SETS[shelfIdx].products.indexOf(product), zone, code: product.code};

      // Front label
      const lc = document.createElement('canvas');
      lc.width=128; lc.height=64;
      const ctx = lc.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0,0,128,64);
      ctx.fillStyle = '#fff';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      // Truncate name
      let displayName = product.name;
      if(displayName.length > 18) displayName = displayName.substring(0,16) + '..';
      ctx.fillText(displayName, 64, 28);
      ctx.font = '8px sans-serif';
      ctx.fillStyle = '#2ecc71';
      ctx.fillText('฿'+product.price, 64, 50);
      const tex = new THREE.CanvasTexture(lc);
      const faceGeo = new THREE.PlaneGeometry(boxW*0.9, boxH*0.8);
      const faceMat = new THREE.MeshBasicMaterial({map:tex, transparent:true});
      const faceMesh = new THREE.Mesh(faceGeo, faceMat);
      faceMesh.position.set(0, 0, boxD/2+0.001);
      mesh.add(faceMesh);

      group.add(mesh);
      productMeshes.push(mesh);
      pIdx++;
    }
  }
}

// Build all 4 shelves
for(let i=0; i<SHELF_SETS.length; i++) createShelfUnit3D(i);

// ═══════════════════════════════════════════
//  SIDEBAR — Shelf selector + Product list
// ═══════════════════════════════════════════
function renderShelfSelector(){
  const el = document.getElementById('shelf-selector');
  el.innerHTML = SHELF_SETS.map((s,i)=>
    `<button class="shelf-btn ${i===activeShelfIdx?'active':''}" onclick="selectShelf(${i})">ชั้น ${i+1}</button>`
  ).join('');
}

function selectShelf(idx){
  activeShelfIdx = idx;
  selectedProductRef = null;
  renderShelfSelector();
  renderProductList();
  animateCameraToShelf(idx);
}

function animateCameraToShelf(idx){
  const targetX = idx * (SHELF_W + 0.08);
  const targetPos = {x: targetX + 0.5, y: 2.2, z: 3.5};
  const targetLook = {x: targetX, y: 1.1, z: 0};

  const startPos = {x: camera.position.x, y: camera.position.y, z: camera.position.z};
  const startTarget = {x: controls.target.x, y: controls.target.y, z: controls.target.z};
  const duration = 600;
  const startTime = Date.now();

  function animateStep(){
    const t = Math.min(1, (Date.now()-startTime)/duration);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.set(
      startPos.x + (targetPos.x-startPos.x)*ease,
      startPos.y + (targetPos.y-startPos.y)*ease,
      startPos.z + (targetPos.z-startPos.z)*ease
    );
    controls.target.set(
      startTarget.x + (targetLook.x-startTarget.x)*ease,
      startTarget.y + (targetLook.y-startTarget.y)*ease,
      startTarget.z + (targetLook.z-startTarget.z)*ease
    );
    controls.update();
    if(t < 1) requestAnimationFrame(animateStep);
  }
  animateStep();
}

function renderProductList(){
  const el = document.getElementById('product-list');
  const shelfSet = SHELF_SETS[activeShelfIdx];
  const zones = [
    {key:'bag', label:'ส้มอ่อน — แพ็คถุง SUG (Bag Pack)', color:ZONE_COLORS.bag},
    {key:'box', label:'ส้มเข้ม — SUG Premium Box', color:ZONE_COLORS.box},
    {key:'acc', label:'ชมพู — อุปกรณ์เสริม (Accessories)', color:ZONE_COLORS.acc}
  ];
  let html = '';
  zones.forEach(z=>{
    const prods = shelfSet.products.filter(p=>p.zone===z.key);
    if(!prods.length) return;
    html += `<div class="section-header"><div class="section-dot" style="background:${z.color}"></div>${z.label}</div>`;
    prods.forEach((p,i)=>{
      const globalIdx = shelfSet.products.indexOf(p);
      const isSelected = selectedProductRef && selectedProductRef.shelfIdx===activeShelfIdx && selectedProductRef.productIdx===globalIdx;
      html += `
        <div class="product-row ${isSelected?'selected':''}" onclick="selectProduct(${activeShelfIdx},${globalIdx})" ondblclick="changeQty(${activeShelfIdx},${globalIdx},1)">
          <div class="zone-bar" style="background:${z.color}"></div>
          <div class="p-info">
            <div class="p-code">${p.code}</div>
            <div class="p-name" title="${p.name}">${p.name}</div>
            <div class="p-meta">${p.pack}</div>
          </div>
          <div class="p-qty">
            <button class="qty-btn" onclick="event.stopPropagation();changeQty(${activeShelfIdx},${globalIdx},-1)">−</button>
            <span class="qty-val">${p.qty}</span>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty(${activeShelfIdx},${globalIdx},1)">+</button>
          </div>
          <div class="p-price">฿${(p.price*p.qty).toLocaleString()}</div>
        </div>
      `;
    });
  });
  el.innerHTML = html;
  updateStats();
}

function selectProduct(shelfIdx, productIdx){
  selectedProductRef = {shelfIdx, productIdx};
  if(shelfIdx !== activeShelfIdx){
    activeShelfIdx = shelfIdx;
    renderShelfSelector();
  }
  renderProductList();
  highlightProduct3D(shelfIdx, productIdx);
}

function changeQty(shelfIdx, productIdx, delta){
  const p = SHELF_SETS[shelfIdx].products[productIdx];
  p.qty = Math.max(0, p.qty + delta);
  renderProductList();
  updateOrder();
}

function highlightProduct3D(shelfIdx, productIdx){
  // Reset all highlights
  productMeshes.forEach(m=>{
    if(m.userData._originalEmissive !== undefined){
      m.material.emissive.setHex(m.userData._originalEmissive);
    }
  });
  // Highlight matching mesh
  productMeshes.forEach(m=>{
    if(m.userData.shelfIdx===shelfIdx && m.userData.productIdx===productIdx){
      m.userData._originalEmissive = m.material.emissive.getHex();
      m.material.emissive.setHex(0x444444);
    }
  });
}

// ═══════════════════════════════════════════
//  STATS + ORDER
// ═══════════════════════════════════════════
function updateStats(){
  let totalProducts = 0, totalPrice = 0;
  SHELF_SETS.forEach(s=> s.products.forEach(p=> {
    if(p.qty > 0){ totalProducts++; totalPrice += p.price * p.qty; }
  }));
  document.getElementById('stat-products').textContent = totalProducts;
  document.getElementById('stat-total').textContent = '฿' + totalPrice.toLocaleString();
}

function updateOrder(){
  const tbody = document.getElementById('order-tbody');
  let html = '', grandTotal = 0;
  SHELF_SETS.forEach((s,si)=>{
    s.products.forEach((p,pi)=>{
      if(p.qty <= 0) return;
      const subtotal = p.price * p.qty;
      grandTotal += subtotal;
      html += `<tr>
        <td title="${p.name}">${p.name.length>25 ? p.name.substring(0,23)+'..' : p.name}</td>
        <td style="font-family:monospace;font-size:10px">${p.code}</td>
        <td class="qty-cell">${p.qty}</td>
        <td>฿${subtotal.toLocaleString()}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:20px">ยังไม่มีสินค้า</td></tr>';
  document.getElementById('order-total').textContent = '฿' + grandTotal.toLocaleString();
}

function exportCSV(){
  let csv = 'รหัส,ชื่อสินค้า,บรรจุภัณฑ์,จำนวน,ราคาต่อหน่วย,รวม\n';
  SHELF_SETS.forEach(s=> s.products.forEach(p=>{
    if(p.qty <= 0) return;
    csv += `${p.code},"${p.name}","${p.pack}",${p.qty},${p.price},${p.price*p.qty}\n`;
  }));
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sug-planogram-order.csv';
  a.click(); URL.revokeObjectURL(url);
}

function exportPDF(){
  window.print();
}

// ═══════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab-bar button').forEach((b,i)=>{
    b.classList.toggle('active', (tab==='products' && i===0)||(tab==='order' && i===1));
  });
  document.getElementById('tab-products').classList.toggle('active', tab==='products');
  document.getElementById('tab-order').classList.toggle('active', tab==='order');
  if(tab==='order') updateOrder();
}

// ═══════════════════════════════════════════
//  RAYCASTING — Click/DblClick on 3D products
// ═══════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('info-tooltip');

canvas.addEventListener('click', e=>{
  updateMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(productMeshes, false);
  if(hits.length){
    const ud = hits[0].object.userData;
    selectProduct(ud.shelfIdx, ud.productIdx);
    showTooltip(e, ud.shelfIdx, ud.productIdx);
  } else {
    tooltip.style.display='none';
    selectedProductRef = null;
    renderProductList();
    productMeshes.forEach(m=>{
      if(m.userData._originalEmissive !== undefined){
        m.material.emissive.setHex(m.userData._originalEmissive);
        delete m.userData._originalEmissive;
      }
    });
  }
});

canvas.addEventListener('dblclick', e=>{
  updateMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(productMeshes, false);
  if(hits.length){
    const ud = hits[0].object.userData;
    changeQty(ud.shelfIdx, ud.productIdx, 1);
  }
});

canvas.addEventListener('mousemove', e=>{
  updateMouse(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(productMeshes, false);
  canvas.style.cursor = hits.length ? 'pointer' : 'default';
});

function updateMouse(e){
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY - rect.top)/rect.height)*2+1;
}

function showTooltip(e, shelfIdx, productIdx){
  const p = SHELF_SETS[shelfIdx].products[productIdx];
  const zoneName = {bag:'แพ็คถุง (Bag Pack)', box:'Premium Box', acc:'อุปกรณ์เสริม (Accessories)'}[p.zone];
  tooltip.innerHTML = `
    <div class="it-name">${p.name}</div>
    <div class="it-row"><b>รหัส:</b> ${p.code}</div>
    <div class="it-row"><b>ประเภท:</b> ${zoneName}</div>
    <div class="it-row"><b>บรรจุภัณฑ์:</b> ${p.pack}</div>
    <div class="it-row"><b>ราคา:</b> <span style="color:var(--green)">฿${p.price}</span></div>
    <div class="it-row"><b>จำนวน:</b> ${p.qty}</div>
  `;
  tooltip.style.display='block';
  const x = Math.min(e.clientX - document.getElementById('sidebar').offsetWidth + 10, canvas.offsetWidth - 240);
  const y = Math.min(e.clientY - 60, canvas.offsetHeight - 180);
  tooltip.style.left = Math.max(10,x)+'px';
  tooltip.style.top = Math.max(10,y)+'px';
}

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(!selectedProductRef) return;
  const {shelfIdx, productIdx} = selectedProductRef;
  if(e.key==='+' || e.key==='=') changeQty(shelfIdx, productIdx, 1);
  if(e.key==='-') changeQty(shelfIdx, productIdx, -1);
  if(e.key==='Delete' || e.key==='Backspace'){
    SHELF_SETS[shelfIdx].products[productIdx].qty = 0;
    renderProductList();
  }
  if(e.key==='Escape'){
    selectedProductRef = null;
    tooltip.style.display='none';
    renderProductList();
    productMeshes.forEach(m=>{
      if(m.userData._originalEmissive !== undefined){
        m.material.emissive.setHex(m.userData._originalEmissive);
        delete m.userData._originalEmissive;
      }
    });
  }
});

// ═══════════════════════════════════════════
//  CAMERA RESET
// ═══════════════════════════════════════════
function resetCamera(){
  animateCameraToShelf(activeShelfIdx);
}

// ═══════════════════════════════════════════
//  RENDER LOOP + RESIZE
// ═══════════════════════════════════════════
function onResize(){
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// Init
onResize();
renderShelfSelector();
renderProductList();
updateStats();
animate();
</script>
</body>
</html>
